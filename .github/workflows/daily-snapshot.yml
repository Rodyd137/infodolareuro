name: Daily snapshot
# Crea un snapshot diario consolidado en data/history/YYYY-MM-DD.json
# tomando data/latest.json al cierre del horario bancario DR (7pm = 23:00 UTC).
# Útil para gráficas día-a-día sin tener que recorrer history/YYYY/MM/DD-HHMM.json.

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy latest.json into data/history
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p data/history
          if [[ ! -f data/latest.json ]]; then
            echo "data/latest.json not found, aborting"
            exit 1
          fi
          cp data/latest.json "data/history/${DATE}.json"
          echo "Wrote data/history/${DATE}.json"

      - name: Commit & push
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/history/
            git commit -m "chore: daily snapshot [skip ci]"
            git push
          else
            echo "Nothing to commit"
          fi
